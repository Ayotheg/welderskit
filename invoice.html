<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invoice Generator | Welder's Kit</title>
    <link rel="stylesheet" href="invoice.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>
<body>
  
    <div class="mobile-content">
        <a href="page.html" class="back-link">
            <i class="bi bi-arrow-left"></i>
            <span>Back to Dashboard</span>
        </a>

        <div class="invoice-container">
            <header>
                <h1>Welder's Invoice</h1>
                <p>Quotation & Invoice Generator</p>
            </header>

            <div id="apiStatus" class="api-status" style="display: none;"></div>
            
            <form id="invoiceForm">
                <!-- Business Info -->
                <section class="section">
                    <h2><i class="bi bi-briefcase-fill"></i> Your Business Info</h2>
                    <div class="form-row">
                        <div class="mb-2">
                            <label>Business Name</label>
                            <input type="text" name="businessName" placeholder="Your Welding Business" required>
                        </div>
                        <div class="mb-2">
                            <label>Phone Number</label>
                            <input type="tel" name="businessPhone" placeholder="+234 800 000 0000">
                        </div>
                    </div>
                    <div class="mb-2">
                        <label>Business Address</label>
                        <input type="text" name="businessAddress" placeholder="123 Street, City, State">
                    </div>
                </section>

                <!-- Customer Info -->
                <section class="section">
                    <h2><i class="bi bi-person-fill"></i> Customer Info</h2>
                    <div class="mb-3">
                        <label>Customer Name</label>
                        <input type="text" name="customerName" placeholder="Customer Name" required>
                    </div>
                    <div class="mb-3">
                        <label>Customer Address</label>
                        <textarea name="customerAddress" placeholder="Customer Address (Optional)" rows="2"></textarea>
                    </div>
                </section>

                <!-- Items -->
                <section class="section items-section">
                    <h2><i class="bi bi-list-check"></i> Project Items</h2>
                    <div id="items">
                        <div class="item">
                            <input type="text" name="description" placeholder="Material (e.g. 3'' Pipe)" required>
                            <div class="item-details">
                                <input type="number" name="quantity" placeholder="Qty" min="1" required>
                                <input type="number" name="price" placeholder="Price (₦)" min="0" step="0.01" required>
                                <button type="button" class="remove-item" onclick="removeItem(this)">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                    <button type="button" id="addItem" class="btn">
                        <i class="bi bi-plus-circle-fill"></i> Add Another Item
                    </button>
                </section>

                <!-- Invoice Details -->
                <section class="section invoice-details">
                    <h2><i class="bi bi-file-earmark-text-fill"></i> Document Details</h2>
                    <div class="form-row">
                        <div>
                            <label>Type</label>
                            <select name="type">
                                <option value="Invoice">Invoice</option>
                                <option value="Quotation">Quotation</option>
                            </select>
                        </div>
                        <div>
                            <label>Due Date</label>
                            <input type="date" name="dueDate">
                        </div>
                    </div>
                    <div class="mt-3">
                        <label>Notes (Optional)</label>
                        <textarea name="notes" placeholder="e.g., Payment before delivery, 50% deposit required." rows="2"></textarea>
                    </div>
                </section>

                <div class="form-footer mt-4">
                    <button type="submit" class="generate-btn">
                        <i class="bi bi-file-pdf-fill"></i> Generate PDF Invoice
                    </button>
                    <p class="text-center mt-3" style="font-size: 11px; color: var(--text-muted);">
                        The PDF will be generated and downloaded automatically.
                    </p>
                </div>
            </form>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/gsap.min.js"></script>
    <script src="invoice.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
