<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Login — Welder or Customer</title>
<style>
  :root{
    --bg:#000;
    --card:#111;
    --accent:#FF6B00;
    --muted:#bbb;
  }
  html,body{height:100%;margin:0}
  body{
    background:var(--bg);
    color:#fff;
    font-family: "Poppins", sans-serif;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:20px;
  }

  .header h1 {
    font-size: 2rem;
    font-weight: 600;
    color: var(--accent);
    margin: 0 0 20px;
    text-shadow:0 0 6px var(--accent),0 0 12px var(--accent);
  }

  /* card container */
  .card {
    position:relative;
    width: 280px;
    height: 360px;
    background: linear-gradient(180deg,var(--card), #1b1b1b);
    border-radius:18px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.6), 0 0 30px rgba(255,107,0,0.08);
    overflow:hidden;
  }

  .panel {
    position:absolute;
    inset:0;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:flex-end;
    padding:22px;
    gap:12px;
    opacity:0;
    transition: opacity 300ms ease;
    pointer-events:none;
    z-index:1;
    text-align:center;
  }
  .panel.active{opacity:1;pointer-events:auto;}
  .panel h2{margin:0;font-size:1.2rem;color:var(--accent);}
  .panel p{margin:0;color:var(--muted);font-size:0.92rem;}
  .cta {
    margin-top: 20px;
    background: var(--accent);
    color: #fff;
    padding: 12px 24px;
    border-radius: 12px;
    font-weight: 700;
    text-decoration: none;
    box-shadow: 0 8px 24px rgba(255, 107, 0, 0.25);
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    display: inline-block;
    border: 1px solid rgba(255, 107, 0, 0.4);
    letter-spacing: 0.5px;
  }

  .cta:hover {
    transform: translateY(-3px);
    background: #FF8533;
    box-shadow: 0 12px 32px rgba(255, 107, 0, 0.4);
    color: #fff;
    border-color: #FF8533;
  }

  .cta:active {
    transform: translateY(-1px);
  }


  #btnWelder{
     font-family: "Poppins", sans-serif !important;
    font-style: normal;
  }

  #btnCustomer{
     font-family: "Poppins", sans-serif !important;
    font-style: normal;
  }

  /* door */
  .door {
    position:absolute;
    inset:0;
    background:var(--accent);
    z-index:2;
    border-radius:0 56% 56% 0;
    transition: transform 600ms cubic-bezier(.2,.9,.25,1), border-radius 600ms cubic-bezier(.2,.9,.25,1);
    transform: translateX(0%);
    pointer-events:auto;
  }
  .door.open-left{ transform: translateX(-100%); border-radius:56% 0 0 56%; }
  .door.open-right{ transform: translateX(100%); border-radius:0 56% 56% 0; }

  /* navigation placed under the card */
  .switch {
    display: flex;
    gap: 12px;
    margin-top: 30px;
    background: rgba(255, 255, 255, 0.12);
    padding: 8px;
    border-radius: 50px;
    border: 1px solid rgba(255, 255, 255, 0.2);
    backdrop-filter: blur(15px);
    box-shadow: 0 4px 24px rgba(0, 0, 0, 0.3), 
                inset 0 0 10px rgba(255, 255, 255, 0.05);
  }

  .switch button {
    background: transparent;
    border: none;
    color: rgba(255, 255, 255, 0.8);
    font-weight: 700;
    font-size: 0.9rem;
    padding: 12px 28px;
    border-radius: 40px;
    cursor: pointer;
    transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative;
    overflow: hidden;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .switch button:hover {
    color: #fff;
    background: rgba(255, 255, 255, 0.1);
  }

  .switch button.active {
    background: linear-gradient(135deg, var(--accent), #ff9a44);
    color: #fff;
    box-shadow: 0 4px 20px rgba(255, 107, 0, 0.5);
    text-shadow: 0 1px 3px rgba(0, 0, 0, 0.3);
  }

  .switch button[disabled] {
    opacity: .45;
    cursor: default;
  }
</style>
</head>
<body>

  <div class="header"><h1>Welder's Kit</h1></div>

  <main class="card">
    <section id="welder" class="panel">
      <h2>Welders</h2>
      <p>Access tools, kits, invoices & dashboard.</p>
      <a class="cta" href="page.html">Continue as Welder</a>
    </section>

    <section id="customer" class="panel">
      <h2>Customers</h2>
      <p>Find services, request quotes & view invoices.</p>
      <a class="cta" href="customer.html">Continue as Customer</a>
    </section>

    <div id="door" class="door"></div>
  </main>

  <!-- navigation now placed *below* the card -->
  <div class="switch">
    <button id="btnWelder">Welders</button>
    <button id="btnCustomer">Customers</button>
  </div>

<script>
(function(){
  const ANIM_MS = 600;
  const door = document.getElementById('door');
  const welder = document.getElementById('welder');
  const customer = document.getElementById('customer');
  const btnWelder = document.getElementById('btnWelder');
  const btnCustomer = document.getElementById('btnCustomer');

  function showPanel(panel){
    welder.classList.remove('active');
    customer.classList.remove('active');
    btnWelder.classList.remove('active');
    btnCustomer.classList.remove('active');
    door.style.pointerEvents = 'auto';

    if(panel === 'welder'){
      btnWelder.classList.add('active');
      door.classList.add('open-left');
      door.classList.remove('open-right');
      setTimeout(()=>{ welder.classList.add('active'); door.style.pointerEvents='none'; }, ANIM_MS);
    } else {
      btnCustomer.classList.add('active');
      door.classList.add('open-right');
      door.classList.remove('open-left');
      setTimeout(()=>{ customer.classList.add('active'); door.style.pointerEvents='none'; }, ANIM_MS);
    }
  }

  // Set initial state
  btnWelder.classList.add('active');

  btnWelder.onclick = ()=> showPanel('welder');
  btnCustomer.onclick = ()=> showPanel('customer');
})();
</script>
</body>
</html>
